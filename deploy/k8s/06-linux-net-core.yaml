# 02-linux-net/archiver-worker.deploy.yaml
# NOTE: Only apply this manifest when LINUX_NET_MONGODB__ENABLED=true.
# When MongoDB is disabled, the archiver-worker exits cleanly on startup.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linux-net-archiver-worker
  namespace: linux-net
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: linux-net
      component: archiver-worker
  template:
    metadata:
      labels:
        app: linux-net
        component: archiver-worker
    spec:
      containers:
      - name: archiver-worker
        image: localhost/linux-net-archiver-worker:0.4.3
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        envFrom:
        - configMapRef:
            name: linux-net-config
        env:
        - name: LINUX_NET_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: password
        - name: LINUX_NET_REDIS__SENTINEL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: password
---
# 02-linux-net/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: linux-net
  namespace: linux-net
spec:
  selector:
    app: linux-net
    component: controller
  ports:
  - port: 9000
    targetPort: 9000
  type: ClusterIP # Could be LoadBalancer if not using Ingress.
