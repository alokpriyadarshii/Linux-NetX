apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "linux-net.fullname" . }}-storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- if .Values.persistence.storageClassName }}
  storageClassName: {{ .Values.persistence.storageClassName | quote }}
  {{- end }}
