# 02-linux-net/configmap.yaml
# ConfigMap for LinuxNet non-secret environment variables
# This ConfigMap contains all non-sensitive configuration options shared by controller and worker
apiVersion: v1
kind: ConfigMap
metadata:
  name: linux-net-config
  namespace: linux-net
  labels:
    app: linux-net
    component: shared
# Update these values as needed for your deployment
# Secrets (passwords, API keys) are NOT included here
data:
  LINUX_NET_LOG__LEVEL: "INFO"
  LINUX_NET_WORKER__PINNED_PER_NODE: "128" # Max number of connected devices per pod
  LINUX_NET_REDIS__HOST: "linux-net-redis-master"    # Operator 创建: 始终指向主节点
  LINUX_NET_REDIS__PORT: "6379"
  LINUX_NET_REDIS__TLS__ENABLED: "false"
  # Vault Credential Provider Configuration
  LINUX_NET_CREDENTIAL__ENABLED: "true"
  LINUX_NET_CREDENTIAL__NAME: "vault_kv"
  LINUX_NET_CREDENTIAL__ADDR: "http://vault.linux-net.svc:8200"
  LINUX_NET_CREDENTIAL__ALLOWED_PATHS: "kv/linux-net"
  LINUX_NET_CREDENTIAL__VERIFY: "false"
  LINUX_NET_CREDENTIAL__CACHE_TTL: "60" # Optimized cache for production
  LINUX_NET_STORAGE__RETENTION_HOURS: "24"
  PYTHONUNBUFFERED: "1"                 # Ensure logs are not buffered
  # MongoDB audit log settings (set LINUX_NET_MONGODB__ENABLED=true to activate)
  LINUX_NET_MONGODB__ENABLED: "true"
  LINUX_NET_MONGODB__URI: "mongodb://linux-net-user:linux-net_password_6b85cc6c1e219b83@mongodb:27017/netrix?authSource=admin"
  LINUX_NET_MONGODB__DATABASE: "netrix"
  LINUX_NET_MONGODB__COLLECTION: "test_linux-net_jobs"
  LINUX_NET_MONGODB__DETACHED_COLLECTION: "test_linux-net_detached_tasks"
  LINUX_NET_MONGODB__RETENTION_DAYS: "30"
  LINUX_NET_MONGODB__DETACHED_RETENTION_DAYS: "30"
  LINUX_NET_MONGODB__MAX_DOCUMENTS: "1000000"
---
# 02-linux-net/controller.deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linux-net-controller
  namespace: linux-net
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: linux-net
      component: controller
  template:
    metadata:
      labels:
        app: linux-net
        component: controller
    spec:
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: linux-net
                component: controller
            topologyKey: kubernetes.io/hostname
      containers:
      - name: controller
        image: localhost/linux-net-controller:0.4.3
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "2Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        readinessProbe:
          exec:
            command:
            - python3
            - -c
            - "import urllib.request, os; req = urllib.request.Request('http://localhost:9000/health', headers={'X-API-KEY': os.environ['LINUX_NET_SERVER__API_KEY']}); urllib.request.urlopen(req)"
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - python3
            - -c
            - "import urllib.request, os; req = urllib.request.Request('http://localhost:9000/health', headers={'X-API-KEY': os.environ['LINUX_NET_SERVER__API_KEY']}); urllib.request.urlopen(req)"
          initialDelaySeconds: 15
          periodSeconds: 20
        envFrom:
        - configMapRef:
            name: linux-net-config
        env:
        - name: LINUX_NET_SERVER__API_KEY
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: api-key
        - name: LINUX_NET_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: password
        - name: LINUX_NET_REDIS__SENTINEL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: password
        - name: LINUX_NET_VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: vault-token
        ports:
        - containerPort: 9000
        volumeMounts:
        - name: linux-net-storage
          mountPath: /app/storage
      volumes:
      - name: linux-net-storage
        persistentVolumeClaim:
          claimName: linux-net-storage
---
# 02-linux-net/node-worker.deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linux-net-node-worker
  namespace: linux-net
spec:
  replicas: 18
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: linux-net
      component: node-worker
  template:
    metadata:
      labels:
        app: linux-net
        component: node-worker
    spec:
      terminationGracePeriodSeconds: 120
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution: # 对于 18 个副本，使用 preferred 以允许每节点有多个
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: linux-net
                  component: node-worker
              topologyKey: kubernetes.io/hostname
      containers:
      - name: node-worker
        image: localhost/linux-net-node-worker:0.4.3
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "16Gi"   # 增加内存上限以支持大文件处理
            cpu: "2000m"
        envFrom:
        - configMapRef:
            name: linux-net-config
        env:
        - name: LINUX_NET_SERVER__API_KEY
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: api-key
        - name: LINUX_NET_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: password
        - name: LINUX_NET_REDIS__SENTINEL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: password
        - name: LINUX_NET_VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: linux-net-secrets
              key: vault-token
        volumeMounts:
        - name: linux-net-storage
          mountPath: /app/storage
      volumes:
      - name: linux-net-storage
        persistentVolumeClaim:
          claimName: linux-net-storage
---
